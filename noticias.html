<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1851064819375390" crossorigin="anonymous"></script>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="alternate icon" href="favicon.svg"/>
<meta name="theme-color" content="#07080a"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PulseFeed</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@700;900&family=Exo+2:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #07080a;
  --surface:  #0f1115;
  --card:     #12141a;
  --card2:    #161820;
  --border:   #1c1f28;
  --border2:  #252a38;
  --neon:     #00f5a0;
  --neon2:    #00c87a;
  --neon-dim: rgba(0,245,160,0.07);
  --neon-glow:rgba(0,245,160,0.2);
  --red:      #ff3c5a;
  --text:     #c8cfe0;
  --text2:    #8892a4;
  --white:    #eef2ff;
  --muted:    #454e62;
  --f1-red:   #e8002d;
  --cs-orange:#f59e0b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Exo 2',sans-serif; font-size:15px; line-height:1.6; min-height:100vh; }
body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.025) 3px,rgba(0,0,0,0.025) 4px); pointer-events:none; z-index:9000; }

/* ── HEADER ── */
.header { position:sticky; top:0; z-index:1000; background:#07080a; border-bottom:1px solid var(--border); padding:0 24px; }
.header-inner { max-width:100%; height:54px; display:flex; align-items:center; gap:16px; }
.logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.logo svg { filter: drop-shadow(0 0 6px rgba(0,245,160,0.4)); animation: pulse-svg 3s ease-in-out infinite; }
@keyframes pulse-svg { 0%,100%{filter:drop-shadow(0 0 4px rgba(0,245,160,0.3))} 50%{filter:drop-shadow(0 0 10px rgba(0,245,160,0.7))} }
.logo-text { font-family:'Orbitron',monospace; font-size:15px; font-weight:900; letter-spacing:3px; color:var(--white); }
.logo-text span { color:var(--neon); letter-spacing:2px; }
.nav { display:flex; align-items:center; gap:2px; flex:1; overflow:visible; }
.nav-btn { display:flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid transparent; background:transparent; color:var(--text2); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; letter-spacing:1px; text-transform:uppercase; border-radius:3px; cursor:pointer; white-space:nowrap; transition:all 0.15s; }
.nav-btn:hover { color:var(--white); border-color:var(--border2); background:rgba(255,255,255,0.04); }
.nav-btn.active { color:var(--white); border-color:var(--border2); background:rgba(255,255,255,0.06); }
.arrow { font-size:9px; opacity:0.6; transition:transform 0.2s; }
.nav-dropdown { position:relative; }
.nav-dropdown.open .arrow { transform:rotate(180deg); }
.nav-dropdown.open > .nav-btn { color:var(--neon); border-color:var(--neon2); background:var(--neon-dim); }
.dropdown-menu { display:none; position:fixed; top:58px; background:var(--card2); border:1px solid var(--border2); border-top:2px solid var(--neon2); min-width:210px; z-index:9999; padding:6px; box-shadow:0 20px 50px rgba(0,0,0,0.8),0 0 30px rgba(0,245,160,0.04); }
.nav-dropdown.open .dropdown-menu { display:block; }
.dropdown-item { display:flex; align-items:center; gap:10px; padding:9px 12px; color:var(--text2); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; cursor:pointer; transition:all 0.12s; border-radius:2px; }
.dropdown-item:hover { background:var(--neon-dim); color:var(--neon); }
.dropdown-item.active { color:var(--neon); background:var(--neon-dim); }
.dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }


/* ── LAYOUT ── */
.page { display:flex; gap:0; max-width:100%; }
.feed { flex:1; min-width:0; padding:20px 20px 60px; border-right:1px solid var(--border); }
.sidebar { width:300px; flex-shrink:0; padding:20px 16px 60px; }

/* ── CARDS GRID ── */
.cards-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }

/* uniform card */
.card { background:var(--card); border:1px solid var(--border); border-radius:5px; overflow:hidden; cursor:pointer; transition:border-color 0.2s,transform 0.2s; display:flex; flex-direction:column; position:relative; min-height:200px; }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--neon),transparent); opacity:0; transition:opacity 0.2s; }
.card:hover { border-color:var(--border2); transform:translateY(-2px); }
.card:hover::before { opacity:1; }

.card .body { padding:20px 22px 22px; flex:1; display:flex; flex-direction:column; gap:10px; }
.card .title { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:600; color:var(--text); line-height:1.4; letter-spacing:0.2px; transition:color 0.15s; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:4px; }
.card:hover .title { color:var(--white); }
.card .desc { font-size:13.5px; color:var(--text2); line-height:1.6; display:-webkit-box; -webkit-line-clamp:6; -webkit-box-orient:vertical; overflow:hidden; font-style:italic; margin-top:2px; }
.meta { display:flex; align-items:center; gap:7px; }
.source-pill { font-family:'Rajdhani',sans-serif; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:2px 7px; border-radius:2px; color:#fff; }
.time { font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:500; letter-spacing:0.5px; color:var(--muted); }

/* ── SECTION HDR ── */
.section-hdr { display:flex; align-items:center; gap:12px; margin:0 0 14px; }
.section-hdr h2 { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--neon); white-space:nowrap; }
.section-hdr::before { content:''; width:3px; height:12px; background:var(--neon); box-shadow:0 0 8px var(--neon); flex-shrink:0; }
.section-hdr::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border2),transparent); }

/* load more */
.load-more-wrap { text-align:center; padding:24px 0 0; }
.load-more { background:transparent; border:1px solid var(--border2); border-radius:3px; padding:9px 28px; color:var(--text2); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
.load-more:hover { color:var(--neon); border-color:var(--neon2); background:var(--neon-dim); }

/* states */
.state { text-align:center; padding:60px 24px; color:var(--text2); grid-column:span 3; }
.state h3 { font-family:'Orbitron',monospace; font-size:18px; color:var(--text); margin-bottom:8px; letter-spacing:2px; }
.spinner { display:inline-block; width:28px; height:28px; border:2px solid var(--border2); border-top-color:var(--neon); border-radius:50%; animation:spin 0.7s linear infinite; margin-bottom:16px; }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.animate { animation:fadeUp 0.3s ease both; }

/* ── CALENDAR SIDEBAR ── */
.cal-block { margin-bottom:24px; }
.cal-title { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.cal-title .ct-icon { font-size:13px; }
.cal-title.f1 { color:var(--f1-red); }
.cal-title.cs { color:var(--cs-orange); }
.cal-title.f1::after,.cal-title.cs::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,currentColor,transparent); opacity:0.3; }

.event-item { display:flex; gap:10px; padding:8px 10px; border-radius:4px; margin-bottom:4px; border:1px solid transparent; transition:all 0.15s; cursor:default; }
.event-item:hover { background:var(--card); border-color:var(--border); }
.event-item.past { opacity:0.35; }
.event-item.next { background:var(--neon-dim); border-color:var(--neon2) !important; opacity:1; }
.event-date { flex-shrink:0; text-align:center; width:36px; }
.event-date .day { font-family:'Orbitron',monospace; font-size:15px; font-weight:700; color:var(--white); line-height:1; }
.event-date .month { font-family:'Rajdhani',sans-serif; font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
.event-item.next .event-date .day { color:var(--neon); }
.event-item.next .event-date .month { color:var(--neon2); }
.event-info { flex:1; min-width:0; }
.event-name { font-family:'Rajdhani',sans-serif; font-size:12.5px; font-weight:600; color:var(--text); line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.event-item.next .event-name { color:var(--white); }
.event-sub { font-family:'Rajdhani',sans-serif; font-size:10.5px; color:var(--muted); letter-spacing:0.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.event-badge { font-family:'Rajdhani',sans-serif; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:1px 6px; border-radius:2px; margin-top:3px; display:inline-block; }
.badge-next { background:rgba(0,245,160,0.15); color:var(--neon); border:1px solid rgba(0,245,160,0.3); }
.badge-major { background:rgba(232,0,45,0.15); color:var(--f1-red); border:1px solid rgba(232,0,45,0.3); }
.badge-sprint { background:rgba(245,158,11,0.15); color:var(--cs-orange); border:1px solid rgba(245,158,11,0.3); }

.cal-sep { border:none; border-top:1px solid var(--border); margin:20px 0; }

@media(max-width:1100px) { .cards-grid{grid-template-columns:repeat(2,1fr)} .sidebar{width:260px} }
@media(max-width:700px) { .cards-grid{grid-template-columns:1fr} }
@media(max-width:800px) { .page{flex-direction:column} .sidebar{width:100%;border-top:1px solid var(--border);padding:16px} .cards-grid{grid-template-columns:1fr 1fr} .feed{padding:16px} }
@media(max-width:500px) { .cards-grid{grid-template-columns:1fr} }

/* ── SESSION ROWS ── */
.sessions-list { display:flex; flex-direction:column; gap:3px; padding-left:46px; }
.session-row { display:flex; align-items:center; gap:6px; font-family:'Rajdhani',sans-serif; font-size:11px; color:var(--muted); }
.session-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.session-date { color:var(--text2); font-weight:600; width:36px; flex-shrink:0; }
.session-label { flex:1; color:var(--text2); }
.session-time { color:var(--muted); font-size:10px; flex-shrink:0; }
.event-item { align-items:flex-start !important; }

/* ── CONTEXT MENU ── */
.ctx-menu {
  display: none;
  position: fixed;
  z-index: 99999;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-top: 2px solid var(--neon2);
  border-radius: 4px;
  padding: 6px;
  min-width: 200px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.7);
  animation: fadeUp 0.12s ease both;
}
.ctx-menu.open { display: block; }
.ctx-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  border-radius: 3px;
  color: var(--text2);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.1s;
}
.ctx-item:hover { background: var(--neon-dim); color: var(--neon); }
.ctx-item .ctx-icon { font-size: 14px; width: 18px; text-align: center; }
.ctx-sep { border: none; border-top: 1px solid var(--border); margin: 4px 0; }


</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo" onclick="goHome()" style="cursor:pointer" title="Home">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- EKG/pulse waveform inside a rounded square -->
        <rect x="1" y="1" width="34" height="34" rx="8" fill="#0f1115" stroke="#00f5a0" stroke-width="1.2" opacity="0.6"/>
        <!-- pulse line -->
        <polyline points="4,18 9,18 11,10 13,26 15,18 18,18 20,14 22,22 24,18 32,18"
          stroke="#00f5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <!-- neon dot at peak -->
        <circle cx="20" cy="14" r="1.8" fill="#00f5a0"/>
      </svg>
      <div class="logo-text">PULSE<span>FEED</span></div>
    </div>
    <nav class="nav" id="navBar">
    </nav>
  </div>
</header>

<div class="page">
  <!-- FEED -->
  <main class="feed">
    <div class="cards-grid" id="newsGrid">
      <div class="state"><div class="spinner"></div><h3>LOADING</h3></div>
    </div>
  </main>

  <!-- CALENDAR SIDEBAR -->
  <aside class="sidebar">
    <!-- F1 -->
    <div class="cal-block">
      <div class="cal-title f1"><span class="ct-icon">🏎️</span> F1 Calendar 2026</div>
      <div id="calF1"></div>
    </div>

    <hr class="cal-sep"/>

    <!-- CS2 -->
    <div class="cal-block">
      <div class="cal-title cs"><span class="ct-icon">🎮</span> CS2 Events 2026</div>
      <div id="calCS"></div>
    </div>
  </aside>
</div>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxOpen"><span class="ctx-icon">↗</span> Abrir artigo</div>
  <div class="ctx-item" id="ctxNewTab"><span class="ctx-icon">⊞</span> Abrir em nova tab</div>
  <div class="ctx-item" id="ctxNewWindow"><span class="ctx-icon">◱</span> Abrir em nova janela</div>
  <hr class="ctx-sep"/>
  <div class="ctx-item" id="ctxCopy"><span class="ctx-icon">⎘</span> Copiar link</div>
</div>
<script>
// ── CALENDAR DATA ──────────────────────────────────────────
let F1_RACES = []; // loaded dynamically from RaceFans iCal

const CS2_EVENTS = [
  { date:'2026-01-28', end:'2026-02-08', name:'IEM Kraków 2026', location:'Cracóvia, Polónia', major:false },
  { date:'2026-02-09', end:'2026-02-23', name:'PGL Cluj-Napoca 2026', location:'Cluj-Napoca, Roménia', major:false },
  { date:'2026-02-25', end:'2026-03-15', name:'ESL Pro League S23', location:'Europa', major:false },
  { date:'2026-03-17', end:'2026-03-29', name:'BLAST Open Spring', location:'Copenhaga', major:false },
  { date:'2026-04-14', end:'2026-04-26', name:'IEM Rio 2026', location:'Rio de Janeiro, Brasil', major:false },
  { date:'2026-05-07', end:'2026-05-17', name:'PGL Astana 2026', location:'Astana, Cazaquistão', major:false },
  { date:'2026-05-12', end:'2026-05-24', name:'IEM Atlanta 2026', location:'Atlanta, EUA', major:false },
  { date:'2026-06-16', end:'2026-07-02', name:'IEM Cologne Major 2026', location:'Colónia, Alemanha', major:true },
  { date:'2026-07-21', end:'2026-08-02', name:'BLAST Open Fall', location:'Londres', major:false },
  { date:'2026-08-04', end:'2026-08-16', name:'BLAST Bounty Fall', location:'Copenhaga', major:false },
  { date:'2026-08-18', end:'2026-08-23', name:'Esports World Cup', location:'Riade, Arábia Saudita', major:false },
  { date:'2026-09-08', end:'2026-09-20', name:'StarSeries Fall 2026', location:'Europa', major:false },
  { date:'2026-10-06', end:'2026-10-18', name:'ESL Pro League S24', location:'Katowice, Polónia', major:false },
  { date:'2026-10-20', end:'2026-11-01', name:'PGL Masters Bucharest', location:'Bucareste, Roménia', major:false },
  { date:'2026-11-10', end:'2026-11-22', name:'IEM China 2026', location:'China', major:false },
  { date:'2026-11-28', end:'2026-12-13', name:'PGL Major Singapore 2026', location:'Singapura', major:true },
];

// ── BUILD CALENDAR ─────────────────────────────────────────
async function buildCalendar() {
  // fetch F1 races from server (RaceFans iCal)
  try {
    const r = await fetch('/api/f1calendar');
    if (r.ok) F1_RACES = await r.json();
  } catch(e) {
    console.warn('F1 calendar fetch failed:', e);
  }
  const now = new Date();
  now.setHours(0,0,0,0);

  // F1 — grouped by weekend with all sessions
  const f1El = document.getElementById('calF1');
  let nextFound = false;

  const futureWeekends = F1_RACES.filter(w => {
    const lastSession = w.sessions[w.sessions.length - 1];
    return new Date(lastSession?.date || w.date) >= now;
  });
  const pastWeekends = F1_RACES.filter(w => !futureWeekends.includes(w));

  // show last 1 past + next 5 future
  const toShow = [...pastWeekends.slice(-1), ...futureWeekends.slice(0, 5)];

  toShow.forEach(weekend => {
    const raceSession = weekend.sessions.find(s => s.type === 'race');
    const raceDate    = raceSession ? new Date(raceSession.date) : new Date(weekend.date);
    const isPast      = raceDate < now;
    const isNext      = !isPast && !nextFound;
    if (isNext) nextFound = true;

    const hasSprint = weekend.sessions.some(s => s.type === 'sprint-race' || s.type === 'sprint-quali');

    // weekend header
    const block = document.createElement('div');
    block.className = 'event-item' + (isPast ? ' past' : '') + (isNext ? ' next' : '');
    block.style.flexDirection = 'column';
    block.style.gap = '8px';

    const firstDate = new Date(weekend.sessions[0]?.date || weekend.date);
    const day = firstDate.getDate();
    const mon = firstDate.toLocaleDateString('pt-PT', {month:'short'}).replace('.','').toUpperCase();

    block.innerHTML = `
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div class="event-date"><div class="day">${day}</div><div class="month">${mon}</div></div>
        <div class="event-info">
          <div class="event-name">${weekend.gpName}</div>
          <div class="event-sub">📍 ${weekend.location}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">
            ${isNext ? '<span class="event-badge badge-next">PRÓXIMA</span>' : ''}
            ${hasSprint ? '<span class="event-badge badge-sprint">SPRINT</span>' : ''}
          </div>
        </div>
      </div>
      <div class="sessions-list">
        ${weekend.sessions.map(s => {
          const sDate = new Date(s.date);
          const sDay  = sDate.getDate();
          const sMon  = sDate.toLocaleDateString('pt-PT', {month:'short'}).replace('.','').toUpperCase();
          const typeColor = {
            'race':          'var(--f1-red)',
            'quali':         'var(--cs-orange)',
            'sprint-race':   '#f97316',
            'sprint-quali':  '#fb923c',
            'practice':      'var(--muted)',
          }[s.type] || 'var(--muted)';
          return `<div class="session-row">
            <span class="session-dot" style="background:${typeColor}"></span>
            <span class="session-date">${sDay} ${sMon}</span>
            <span class="session-label">${s.label}</span>
            <span class="session-time">${s.timeUTC}</span>
          </div>`;
        }).join('')}
      </div>`;
    f1El.appendChild(block);
  });

  // CS2
  const csEl = document.getElementById('calCS');
  let nextCSFound = false;
  CS2_EVENTS.forEach(e => {
    const start = new Date(e.date);
    const end   = new Date(e.end);
    const isPast = end < now;
    const isNext = !isPast && !nextCSFound;
    if (isNext) nextCSFound = true;

    const pastOnes = CS2_EVENTS.filter(x => new Date(x.end) < now);
    if (isPast && pastOnes.indexOf(e) < pastOnes.length - 2) return;

    const futureIdx = CS2_EVENTS.filter(x => new Date(x.end) >= now).indexOf(e);
    if (!isPast && futureIdx > 7) return;

    const day = start.getDate();
    const mon = start.toLocaleDateString('pt-PT', {month:'short'}).replace('.','').toUpperCase();
    const div = document.createElement('div');
    div.className = 'event-item' + (isPast ? ' past' : '') + (isNext ? ' next' : '');
    div.innerHTML = `
      <div class="event-date"><div class="day">${day}</div><div class="month">${mon}</div></div>
      <div class="event-info">
        <div class="event-name">${e.name}</div>
        <div class="event-sub">📍 ${e.location}</div>
        ${isNext ? '<span class="event-badge badge-next">A SEGUIR</span>' : ''}
        ${e.major ? '<span class="event-badge badge-major">MAJOR</span>' : ''}
      </div>`;
    csEl.appendChild(div);
  });
}

// ── NEWS STATE ─────────────────────────────────────────────
let currentSource   = null;
let currentCategory = null;
let currentPage     = 1;
let totalPages      = 1;
let allItems        = [];
let sources         = [];

const CATEGORIES = [
  { id:'noticias', label:'Notícias',   color:'#94a3b8' },
  { id:'jogos',    label:'Jogos',      color:'#22c55e' },
  { id:'esports',  label:'Esports',    color:'#f97316' },
  { id:'f1',       label:'F1',         color:'#ef4444' },
  { id:'tech',     label:'Tecnologia', color:'#3b82f6' },
];

window.addEventListener('DOMContentLoaded', async () => {
  await buildCalendar();
  document.addEventListener('click', e => {
    if (!e.target.closest('.nav-dropdown'))
      document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
  });
  await loadSources();
  loadNews(); // load all feeds by default
  setInterval(() => loadNews(true), 10 * 60 * 1000);
});

async function loadSources() {
  try { const r = await fetch('/api/sources'); sources = await r.json(); } catch { return; }
  const nav = document.getElementById('navBar');
  for (const cat of CATEGORIES) {
    const catSrc = sources.filter(s => s.category === cat.id);
    if (!catSrc.length) continue;
    const wrap = document.createElement('div');
    wrap.className = 'nav-dropdown';
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.id = 'cat-' + cat.id;

    // label span (clicks open category)
    const labelSpan = document.createElement('span');
    labelSpan.innerHTML = `<span style="color:${cat.color}">▸</span> ${cat.label}`;
    labelSpan.style.flex = '1';
    labelSpan.addEventListener('click', e => {
      e.stopPropagation();
      document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
      selectFilter(cat.id, null);
    });

    // arrow span (clicks open dropdown)
    const arrowSpan = document.createElement('span');
    arrowSpan.className = 'arrow';
    arrowSpan.textContent = '▾';
    arrowSpan.style.padding = '0 2px 0 6px';
    arrowSpan.style.borderLeft = '1px solid var(--border2)';
    arrowSpan.style.marginLeft = '4px';
    arrowSpan.addEventListener('click', e => {
      e.stopPropagation();
      const isOpen = wrap.classList.contains('open');
      document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
      if (!isOpen) {
        const rect = btn.getBoundingClientRect();
        menu.style.left = rect.left + 'px';
        menu.style.top  = (rect.bottom + 4) + 'px';
        wrap.classList.add('open');
      }
    });

    btn.appendChild(labelSpan);
    btn.appendChild(arrowSpan);
    const menu = document.createElement('div');
    menu.className = 'dropdown-menu';
    menu.style.cssText += `border-top: 2px solid ${cat.color} !important;`;
    const allItem = document.createElement('div');
    allItem.className = 'dropdown-item';
    allItem.id = 'all-' + cat.id;
    allItem.addEventListener('click', () => { selectFilter(cat.id, null); wrap.classList.remove('open'); });
    menu.appendChild(allItem);
    for (const s of catSrc) {
      const item = document.createElement('div');
      item.className = 'dropdown-item';
      item.id = 'src-' + s.id;
      item.innerHTML = `<span class="dot" style="background:${cat.color}"></span>${s.name}`;
      item.style.setProperty('--cat-c', cat.color);
      item.addEventListener('mouseenter', () => { item.style.color = cat.color; item.style.background = cat.color + '12'; });
      item.addEventListener('mouseleave', () => { if (!item.classList.contains('active')) { item.style.color = ''; item.style.background = ''; } });
      item.addEventListener('click', () => { selectFilter(cat.id, s.id); wrap.classList.remove('open'); });
      menu.appendChild(item);
    }
    wrap.appendChild(btn); wrap.appendChild(menu);
    nav.appendChild(wrap);
  }
}

function goHome() {
  clearActive();
  currentCategory = null; currentSource = null;
  currentPage = 1; allItems = []; loadNews();
}
function selectFilter(catId, srcId) {
  clearActive();
  currentCategory = catId; currentSource = srcId;
  currentPage = 1; allItems = [];
  const cb = document.getElementById('cat-' + catId);
  if (cb) {
    cb.classList.add('active');
    const c = CATEGORIES.find(x => x.id === catId)?.color || 'var(--neon)';
    cb.style.borderColor = c;
    cb.style.background  = c + '15';
  }
  const ib = document.getElementById(srcId ? 'src-'+srcId : 'all-'+catId);
  if (ib) {
    ib.classList.add('active');
    const c = CATEGORIES.find(x => x.id === catId)?.color || 'var(--neon)';
    ib.style.color = c;
    ib.style.background = c + '15';
  }
  loadNews();
}
function clearActive() {
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('active');
    b.style.borderColor = '';
    b.style.background  = '';
    b.style.color       = '';
  });
  document.querySelectorAll('.dropdown-item').forEach(i => {
    i.classList.remove('active');
    i.style.color      = '';
    i.style.background = '';
  });
}
function refresh() { allItems = []; currentPage = 1; loadNews(); }

async function loadNews(silent = false) {
  if (!silent) showLoading();
  const p = new URLSearchParams({ page: currentPage, limit:30 });
  if (currentSource)        p.set('source', currentSource);
  else if (currentCategory) p.set('category', currentCategory);
  try {
    const res = await fetch('/api/news?' + p);
    const data = await res.json();
    totalPages = data.pages;
    allItems = currentPage === 1 ? data.items : [...allItems, ...data.items];
    renderNews();
  } catch { showError(); }
}

// ── FALLBACK IMAGE ────────────────────────────────────────
function getFallbackImage(item) {
  // deterministic seed from title so same article always gets same image
  let seed = 0;
  for (let i = 0; i < item.title.length; i++) seed = (seed * 31 + item.title.charCodeAt(i)) & 0xffff;
  seed = (seed % 900) + 100; // 100-999

  // use picsum.photos with seed — reliable, free, no API key
  return `https://picsum.photos/seed/${seed}/600/340`;
}

function renderNews() {
  const grid = document.getElementById('newsGrid');
  if (!allItems.length) {
    grid.innerHTML = '<div class="state"><h3>SEM RESULTADOS</h3></div>';
    return;
  }
  grid.innerHTML = '';

  allItems.forEach((item, i) => {
    const src = sources.find(s => s.id === item.sourceId) || { color:'#00f5a0' };
    const card = document.createElement('article');
    card.className = 'card animate';
    card.style.animationDelay = Math.min(i * 30, 300) + 'ms';
    card.onclick = () => window.open(item.link, '_blank');
    card.dataset.url = item.link;
    card.innerHTML = `
      <div class="body">
        <div class="meta">
          <span class="source-pill" style="background:${src.color}">${esc(item.source)}</span>
          <span class="time">${timeAgo(item.pubDate)}</span>
        </div>
        <div class="title">${esc(item.title)}</div>
        ${item.description ? `<div class="desc">${esc(item.description)}</div>` : ''}
      </div>`;
    grid.appendChild(card);
  });

  if (currentPage < totalPages) {
    // load more sits outside grid
    let lm = document.querySelector('.load-more-wrap');
    if (!lm) {
      lm = document.createElement('div');
      lm.className = 'load-more-wrap';
      const btn = document.createElement('button');
      btn.className = 'load-more';
      btn.textContent = '▸ Carregar Mais';
      btn.onclick = () => { currentPage++; loadNews(true); };
      lm.appendChild(btn);
      document.querySelector('.feed').appendChild(lm);
    }
  } else {
    document.querySelector('.load-more-wrap')?.remove();
  }
}

function showLoading() {
  document.getElementById('newsGrid').innerHTML =
    '<div class="state"><div class="spinner"></div><h3>LOADING</h3></div>';
}
function showError() {
  document.getElementById('newsGrid').innerHTML =
    '<div class="state"><h3>CONNECTION ERROR</h3><p>Verifica se o servidor está a correr.</p></div>';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(iso) {
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1) return 'agora';
  if (m < 60) return m + 'm';
  const h = Math.floor(m/60);
  if (h < 24) return h + 'h';
  return Math.floor(h/24) + 'd';
}

// ── CONTEXT MENU ──────────────────────────────────────────
let ctxUrl = null;
const ctxMenu = document.getElementById('ctxMenu');

function closeCtxMenu() { ctxMenu.classList.remove('open'); ctxUrl = null; }

// delegation: catches right-click on card OR any child element
document.addEventListener('contextmenu', e => {
  const card = e.target.closest('.card');
  if (!card) { closeCtxMenu(); return; }
  e.preventDefault();
  ctxUrl = card.dataset.url;
  const x = Math.min(e.clientX, window.innerWidth  - 220);
  const y = Math.min(e.clientY, window.innerHeight - 170);
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top  = y + 'px';
  ctxMenu.classList.add('open');
});

document.addEventListener('click',   closeCtxMenu);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCtxMenu(); });

document.getElementById('ctxOpen').addEventListener('click', () => {
  if (ctxUrl) window.location.href = ctxUrl;
  closeCtxMenu();
});
document.getElementById('ctxNewTab').addEventListener('click', () => {
  if (ctxUrl) window.open(ctxUrl, '_blank');
  closeCtxMenu();
});
document.getElementById('ctxNewWindow').addEventListener('click', () => {
  if (ctxUrl) window.open(ctxUrl, '_blank', 'noopener,noreferrer');
  closeCtxMenu();
});
document.getElementById('ctxCopy').addEventListener('click', () => {
  if (ctxUrl) navigator.clipboard.writeText(ctxUrl).catch(() => {});
  closeCtxMenu();
});


// ── TWITCH ────────────────────────────────────────────────
function loadTwitch() {
  const channel = document.getElementById('twitchChannel').value.trim();
  if (!channel) return;

  const parent = window.location.hostname || 'localhost';
  const playerDiv = document.getElementById('twitchPlayer');
  const embedDiv  = document.getElementById('twitchEmbed');
  const nameEl    = document.getElementById('twitchChannelName');

  // inject iframe
  playerDiv.innerHTML = `<iframe
    src="https://player.twitch.tv/?channel=${encodeURIComponent(channel)}&parent=${parent}&muted=false&autoplay=true"
    allowfullscreen="true"
    scrolling="no"
    width="100%"
    height="100%">
  </iframe>`;

  nameEl.textContent = '🟣 ' + channel;
  embedDiv.style.display = 'block';
}

function closeTwitch() {
  document.getElementById('twitchPlayer').innerHTML = '';
  document.getElementById('twitchEmbed').style.display = 'none';
  document.getElementById('twitchChannel').value = '';
}

// allow Enter key to load
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('twitchChannel');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') loadTwitch(); });
});

</script>
